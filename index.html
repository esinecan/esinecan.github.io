<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23008080'/%3E%3Crect x='2' y='2' width='12' height='9' fill='%23c0c0c0'/%3E%3Crect x='3' y='3' width='10' height='2' fill='%23000080'/%3E%3Crect x='3' y='6' width='10' height='4' fill='%23ffffff'/%3E%3Crect x='5' y='12' width='6' height='2' fill='%23c0c0c0'/%3E%3C/svg%3E">
<title>Eren Can Sinecan</title>
<meta name="description" content="Most problems are devex problems. The developer isn't always human. Agent harnesses, knowledge graphs, MCP servers.">
<meta property="og:title" content="Eren Can Sinecan">
<meta property="og:description" content="Most problems are devex problems. The developer isn't always human.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://esinecan.com">
<style>
  /* real pixel-bitmap MS Sans Serif (the actual Win9x system font), Tahoma falls back */
  @font-face{
    font-family:'PxSans';
    src:url('https://cdn.jsdelivr.net/npm/98.css@0.1.20/dist/ms_sans_serif.woff') format('woff');
    font-weight:normal; font-display:swap;
  }
  @font-face{
    font-family:'PxSans';
    src:url('https://cdn.jsdelivr.net/npm/98.css@0.1.20/dist/ms_sans_serif_bold.woff') format('woff');
    font-weight:bold; font-display:swap;
  }
  /* ============ Win95 system ============ */
  :root{
    --face:#c0c0c0;
    --face-dark:#808080;
    --hi:#ffffff;
    --hi2:#dfdfdf;
    --shadow:#808080;
    --shadow2:#000000;
    --title:#000080;
    --title2:#1084d0;
    --title-inactive:#808080;
    --title-inactive2:#b5b5b5;
    --desktop:#008080;
    --link:#0000ee;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--desktop);
    font-family:'PxSans',Tahoma,"MS Sans Serif","Segoe UI",sans-serif;
    font-size:11px;
    color:#000;
    overflow:hidden;
    -webkit-font-smoothing:none;
    font-smooth:never;
    user-select:none;
    cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='22'%20height='26'%3E%3Cpath%20d='M3%202V20L8%2015L11%2022L14%2021L11%2014L18%2014Z'%20fill='black'%20stroke='white'%20stroke-width='1.5'/%3E%3C/svg%3E") 3 2, auto;
  }

  /* raised bevel (windows, buttons) */
  .bevel-out{
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2),
      inset  1px  1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow),
      inset  2px  2px 0 0 var(--hi2);
  }
  /* sunken bevel (text fields, tray) */
  .bevel-in{
    box-shadow:
      inset  1px  1px 0 0 var(--shadow2),
      inset -1px -1px 0 0 var(--hi),
      inset  2px  2px 0 0 var(--shadow),
      inset -2px -2px 0 0 var(--hi2);
  }

  /* ============ Desktop ============ */
  #desktop{
    position:absolute;
    inset:0 0 30px 0;
    overflow:hidden;
    background:
      radial-gradient(140% 120% at 30% 18%, #14938f 0%, var(--desktop) 45%, #006a6a 100%);
  }
  /* whisper-faint CRT scanlines for atmosphere, not a gimmick */
  #desktop::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
    opacity:.5;
    z-index:5;
  }
  .desk-icons{
    position:absolute;
    top:8px; left:8px;
    display:flex;
    flex-direction:column;
    gap:4px;
    width:84px;
  }
  .desk-icon{
    width:84px;
    padding:6px 4px;
    text-align:center;
    color:#fff;
    cursor:default;
    border:1px dotted transparent;
  }
  .desk-icon .ic{display:block; margin:0 auto 3px; width:34px; height:34px;}
  .desk-icon span{
    display:inline-block;
    padding:1px 3px;
    line-height:1.25;
    text-shadow:1px 1px 0 #000;
  }
  .desk-icon.sel{ border:1px dotted #fff; }
  .desk-icon.sel span{ background:var(--title); text-shadow:none; }

  /* ============ Windows ============ */
  .window{
    position:absolute;
    background:var(--face);
    padding:3px;
    min-width:200px;
    display:flex;
    flex-direction:column;
    animation:winOpen .11s ease-out;
    transform-origin:center top;
  }
  @keyframes winOpen{
    from{ transform:scale(.86); opacity:.4; }
    to{ transform:scale(1); opacity:1; }
  }
  .window.closing{ animation:winClose .1s ease-in forwards; }
  @keyframes winClose{ to{ transform:scale(.86); opacity:0; } }
  .title-bar{
    height:20px;
    background:linear-gradient(90deg,var(--title),var(--title2));
    display:flex;
    align-items:center;
    padding:0 2px 0 3px;
    flex:0 0 auto;
    cursor:default;
  }
  .window.inactive .title-bar{
    background:linear-gradient(90deg,var(--title-inactive),var(--title-inactive2));
  }
  .title-bar-text{
    color:#fff;
    font-weight:bold;
    font-size:11px;
    display:flex;
    align-items:center;
    gap:4px;
    flex:1 1 auto;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .title-bar-text .tic{width:16px;height:16px;flex:0 0 16px;}
  .title-bar-controls{display:flex; gap:2px;}
  .tb-btn{
    width:16px; height:14px;
    background:var(--face);
    border:0;
    padding:0;
    font-family:inherit;
    font-size:9px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:default;
    color:#000;
  }
  .tb-btn:active{ box-shadow:
      inset  1px  1px 0 0 var(--shadow2),
      inset -1px -1px 0 0 var(--hi),
      inset  2px  2px 0 0 var(--shadow),
      inset -2px -2px 0 0 var(--hi2); }
  .tb-glyph{display:block;}

  .window-body{
    flex:1 1 auto;
    margin:3px 1px 1px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  /* sunken content panes */
  .pane{
    background:#fff;
    margin:0;
    flex:1 1 auto;
    overflow:auto;
    padding:10px 12px;
    min-height:0;
    user-select:text;
    line-height:1.5;
  }
  .pane.gray{ background:var(--face); user-select:none; }

  /* menu strip under title bar (WordPad-ish) */
  .menustrip{
    display:flex; gap:0;
    padding:1px 2px;
    flex:0 0 auto;
  }
  .menustrip span{ padding:1px 7px; }
  .menustrip span:hover{ background:var(--title); color:#fff; }

  /* ============ content typography inside white panes ============ */
  /* headings use the SAME bitmap face, snapped to the 11px pixel grid so they stay crisp */
  .pane h1{ font-size:22px; line-height:1.1; margin:0 0 6px; font-weight:bold; }
  .pane h2{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; margin:22px 0 9px; border-bottom:1px solid #808080; padding-bottom:3px; font-weight:bold; }
  .pane h3{ font-size:11px; margin:0 0 3px; font-weight:bold; }
  .pane p{ margin:0 0 9px; }
  .pane a{ color:var(--link); text-decoration:underline; cursor:pointer; }
  .pane a:visited{ color:#551a8b; }
  .pane code{ font-family:"Courier New",monospace; font-size:11px; background:#eee; padding:0 2px; }
  .pane pre{
    font-family:"Courier New",monospace; font-size:11px; line-height:1.45;
    background:#000; color:#46d35a; padding:9px 11px; margin:8px 0 13px;
    overflow-x:auto; white-space:pre;
    box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 #4a4a4a, inset 2px 2px 0 #2a2a2a;
  }
  .pane pre code{ background:none; padding:0; color:inherit; font-size:inherit; }
  .pane table{ border-collapse:collapse; margin:6px 0 12px; width:100%; font-size:11px; }
  .pane th,.pane td{ border:1px solid #808080; padding:3px 6px; text-align:left; vertical-align:top; }
  .pane th{ background:var(--face); }
  .pane strong{ font-weight:bold; }

  /* file-list view (folder windows) */
  .filelist{ padding:6px; }
  .file-row{
    display:flex; align-items:center; gap:8px;
    padding:3px 6px;
    cursor:default;
    border:1px dotted transparent;
  }
  .file-row:hover{ background:#e8e8e8; }
  .file-row.sel{ background:var(--title); color:#fff; border:1px dotted #fff; }
  .file-row .ic{ width:28px; height:28px; flex:0 0 28px; }
  .file-row .meta{ display:flex; flex-direction:column; }
  .file-row .fn{ font-weight:bold; }
  .file-row .fd{ color:#444; font-size:11px; }
  .file-row.sel .fd{ color:#cdd; }

  /* status bar */
  .statusbar{
    flex:0 0 auto;
    display:flex;
    margin-top:3px;
    gap:3px;
  }
  .statusbar .seg{
    padding:2px 6px;
    flex:0 0 auto;
  }
  .statusbar .seg.grow{ flex:1 1 auto; }

  /* property-window rows */
  .field-row{ display:flex; gap:8px; margin:0 0 7px; align-items:baseline; }
  .field-row .lbl{ width:78px; flex:0 0 78px; color:#000; }
  .group{
    margin:0 0 12px;
    padding:14px 12px 12px;
    position:relative;
    box-shadow:
      inset  1px  1px 0 0 var(--shadow),
      inset -1px -1px 0 0 var(--hi);
  }
  .group > legend, .group-title{
    position:absolute; top:-7px; left:8px;
    background:var(--face);
    padding:0 4px;
    font-weight:bold;
  }
  .pane.gray .group{ background:var(--face); }

  .tag{
    display:inline-block;
    margin:2px 3px 2px 0;
    padding:1px 6px;
    font-size:11px;
    background:var(--face);
    box-shadow:
      inset -1px -1px 0 0 var(--shadow),
      inset  1px  1px 0 0 var(--hi);
  }

  .btn{
    font-family:inherit; font-size:11px;
    background:var(--face);
    border:0;
    padding:4px 12px;
    min-width:70px;
    cursor:default;
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2),
      inset  1px  1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow),
      inset  2px  2px 0 0 var(--hi2);
  }
  .btn:active{
    box-shadow:
      inset  1px  1px 0 0 var(--shadow2),
      inset -1px -1px 0 0 var(--hi),
      inset  2px  2px 0 0 var(--shadow),
      inset -2px -2px 0 0 var(--hi2);
  }

  /* ============ chunky scrollbars ============ */
  .pane::-webkit-scrollbar,.filelist-wrap::-webkit-scrollbar{ width:16px; height:16px; }
  .pane::-webkit-scrollbar-track{ background:#dfdfdf; }
  .pane::-webkit-scrollbar-thumb{
    background:var(--face);
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2),
      inset  1px  1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow),
      inset  2px  2px 0 0 var(--hi2);
  }

  /* ============ Taskbar ============ */
  #taskbar{
    position:absolute;
    left:0; right:0; bottom:0;
    height:30px;
    background:var(--face);
    display:flex;
    align-items:center;
    gap:4px;
    padding:2px 3px;
    box-shadow: inset 0 1px 0 0 var(--hi);
    z-index:99999;
  }
  #start-btn{
    display:flex; align-items:center; gap:4px;
    font-family:inherit; font-size:11px; font-weight:bold;
    background:var(--face);
    border:0;
    height:23px;
    padding:0 7px 0 5px;
    cursor:default;
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2),
      inset  1px  1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow),
      inset  2px  2px 0 0 var(--hi2);
  }
  #start-btn.on{
    box-shadow:
      inset  1px  1px 0 0 var(--shadow2),
      inset -1px -1px 0 0 var(--hi),
      inset  2px  2px 0 0 var(--shadow),
      inset -2px -2px 0 0 var(--hi2);
  }
  .task-buttons{
    flex:1 1 auto;
    display:flex; gap:4px;
    overflow:hidden;
  }
  .task-btn{
    font-family:inherit; font-size:11px;
    height:23px;
    min-width:140px; max-width:170px;
    padding:0 6px;
    display:flex; align-items:center; gap:5px;
    background:var(--face);
    border:0;
    cursor:default;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2),
      inset  1px  1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow),
      inset  2px  2px 0 0 var(--hi2);
  }
  .task-btn .ic{ width:16px; height:16px; flex:0 0 16px; }
  .task-btn .lbl{ overflow:hidden; text-overflow:ellipsis; }
  .task-btn.active{
    font-weight:bold;
    background:repeating-conic-gradient(#c0c0c0 0% 25%, #bdbdbd 0% 50%) 50% / 3px 3px;
    box-shadow:
      inset  1px  1px 0 0 var(--shadow2),
      inset -1px -1px 0 0 var(--hi),
      inset  2px  2px 0 0 var(--shadow),
      inset -2px -2px 0 0 var(--hi2);
  }
  #tray{
    flex:0 0 auto;
    display:flex; align-items:center;
    padding:3px 8px;
    height:23px;
    box-shadow:
      inset  1px  1px 0 0 var(--shadow),
      inset -1px -1px 0 0 var(--hi);
  }
  #clock{ font-size:11px; }

  /* ============ Start menu ============ */
  #start-menu{
    position:absolute;
    left:3px; bottom:31px;
    width:190px;
    background:var(--face);
    padding:3px;
    display:none;
    z-index:99998;
  }
  #start-menu.open{ display:flex; }
  .sm-banner{
    width:24px;
    background:linear-gradient(180deg,#000080,#1084d0);
    margin-right:3px;
    flex:0 0 24px;
    position:relative;
  }
  .sm-banner span{
    position:absolute;
    bottom:8px; left:50%;
    transform:translateX(-50%) rotate(-90deg);
    transform-origin:center;
    white-space:nowrap;
    color:#fff;
    font-size:16px; font-weight:bold;
    letter-spacing:1px;
  }
  .sm-banner b{ color:#fff; }
  .sm-banner i{ font-style:normal; font-weight:normal; }
  .sm-items{ flex:1 1 auto; }
  .sm-item{
    display:flex; align-items:center; gap:8px;
    padding:5px 6px;
    cursor:default;
  }
  .sm-item .ic{ width:24px; height:24px; flex:0 0 24px; }
  .sm-item:hover{ background:var(--title); color:#fff; }
  .sm-sep{ height:0; border-top:1px solid var(--shadow); border-bottom:1px solid var(--hi); margin:3px 1px; }

  .hint{ color:#fff; text-shadow:1px 1px 0 #000; position:absolute; bottom:38px; right:12px; font-size:11px; opacity:.85; }

  body.busy, body.busy *{
    cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='28'%3E%3Cellipse%20cx='12'%20cy='14'%20rx='7'%20ry='10'%20fill='%23fff'%20stroke='%23000'%20stroke-width='1.5'/%3E%3Cpath%20d='M6%208h12M6%2020h12'%20stroke='%23000'%20stroke-width='1.5'/%3E%3C/svg%3E") 12 14, wait !important;
  }

  /* ============ Boot sequence ============ */
  #boot{
    position:fixed; inset:0; z-index:1000000;
    background:#000; color:#c0c0c0;
    font-family:"Courier New",monospace; font-size:14px;
    display:flex; flex-direction:column;
    cursor:default;
  }
  #boot.fade{ animation:bootFade .5s ease forwards; }
  @keyframes bootFade{ to{ opacity:0; visibility:hidden; } }
  #boot .post{
    padding:18px 22px; white-space:pre-wrap; line-height:1.5;
    flex:1 1 auto;
  }
  #boot .post .ln{ opacity:0; animation:lnIn .01s linear forwards; }
  @keyframes lnIn{ to{ opacity:1; } }
  #boot .splash{
    position:absolute; inset:0; margin:auto;
    width:420px; height:240px;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    background:linear-gradient(135deg,#000080,#1084d0);
    color:#fff;
    box-shadow:
      inset -2px -2px 0 0 #000, inset 2px 2px 0 0 #5a9bd4,
      0 0 0 1px #000, 6px 6px 22px rgba(0,0,0,.6);
    font-family:'PxSans',Tahoma,sans-serif;
  }
  #boot .splash.on{ display:flex; }
  #boot .logo{ font-size:44px; font-weight:bold; letter-spacing:1px; text-shadow:2px 2px 0 #000040; }
  #boot .logo small{ font-size:22px; font-weight:normal; vertical-align:super; }
  #boot .tagsplash{ margin-top:6px; font-size:12px; color:#cfe0ff; }
  #boot .progress{
    margin-top:26px; width:240px; height:16px;
    background:#000040; padding:2px;
    box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 #5a9bd4;
    overflow:hidden;
  }
  #boot .progress i{
    display:block; height:100%; width:30%;
    background:repeating-linear-gradient(90deg,#28d 0 10px, transparent 10px 14px);
    animation:march 1s linear infinite;
  }
  @keyframes march{ from{ transform:translateX(-40px);} to{ transform:translateX(40px);} }
  #boot .skip{ position:absolute; bottom:14px; right:18px; font-size:11px; color:#777; font-family:'PxSans',Tahoma,sans-serif; }

  /* ============ Right-click context menu ============ */
  #ctx-menu{
    position:absolute; z-index:99997;
    min-width:160px;
    background:var(--face);
    padding:2px;
    display:none;
    box-shadow:
      inset -1px -1px 0 0 var(--shadow2), inset 1px 1px 0 0 var(--hi),
      inset -2px -2px 0 0 var(--shadow), inset 2px 2px 0 0 var(--hi2),
      2px 2px 5px rgba(0,0,0,.4);
  }
  #ctx-menu.open{ display:block; }
  #ctx-menu .ci{ padding:4px 22px 4px 22px; }
  #ctx-menu .ci:hover{ background:var(--title); color:#fff; }
  #ctx-menu .ci.dis{ color:var(--face-dark); }
  #ctx-menu .ci.dis:hover{ background:transparent; color:var(--face-dark); }
  #ctx-menu .csep{ height:0; border-top:1px solid var(--shadow); border-bottom:1px solid var(--hi); margin:3px 2px; }

  /* ============ Mobile: desktop metaphor adapted for touch ============ */
  @media (max-width:760px){
    body{ font-size:12px; }
    .hint{ display:none; }
    #ctx-menu{ display:none !important; }

    /* taller bars for finger targets */
    #desktop{ inset:0 0 42px 0; }
    #taskbar{ height:42px; padding:3px 4px; gap:5px; }
    #start-btn{ height:34px; font-size:13px; padding:0 12px 0 8px; }
    #tray{ height:34px; padding:0 8px; }
    #clock{ font-size:12px; }
    .task-btn{ height:34px; min-width:0; flex:1 1 0; font-size:12px; }

    /* desktop icons become a wrapping launcher grid */
    .desk-icons{ flex-direction:row; flex-wrap:wrap; width:auto; right:8px; top:10px; gap:6px 4px; }
    .desk-icon{ width:25%; max-width:92px; padding:8px 2px; }
    .desk-icon .ic{ width:44px; height:44px; }
    .desk-icon span{ font-size:12px; }

    /* windows: one at a time, full screen above the taskbar */
    .window{
      left:0 !important; top:0 !important;
      width:100vw !important; height:calc(100vh - 42px) !important;
      padding:2px;
    }
    .title-bar{ height:30px; padding:0 3px 0 5px; }
    .title-bar-text{ font-size:13px; }
    .title-bar-text .tic{ width:20px; height:20px; flex-basis:20px; }
    .tb-btn{ width:30px; height:24px; font-size:13px; }
    .tb-btn[data-act="max"]{ display:none; }   /* already full screen */
    .menustrip{ padding:3px 2px; }
    .menustrip span{ padding:4px 10px; }

    /* comfortable reading size in article/content panes (chrome stays small) */
    .pane:not(.gray){ font-size:14px; line-height:1.6; padding:14px 15px; }
    .pane:not(.gray) h1{ font-size:22px; }
    .pane:not(.gray) h2{ font-size:13px; }
    .pane.gray{ font-size:13px; }
    .file-row{ padding:9px 8px; }
    .file-row .ic{ width:34px; height:34px; flex-basis:34px; }
    .file-row .fd{ font-size:12px; }
    .group{ padding:16px 13px 13px; }
    .btn{ padding:8px 14px; font-size:13px; }

    /* start menu: wide and tappable */
    #start-menu{ left:3px; bottom:43px; width:min(78vw,300px); }
    .sm-item{ padding:10px 8px; font-size:14px; }
    .sm-item .ic{ width:28px; height:28px; flex-basis:28px; }
    .sm-banner{ width:30px; flex-basis:30px; }

    /* boot fits a phone */
    #boot .post{ font-size:11px; padding:14px 14px; }
    #boot .splash{ width:88vw; height:200px; }
    #boot .logo{ font-size:34px; }
  }
</style>
</head>
<body>

<!-- ================= BOOT ================= -->
<div id="boot">
  <div class="post" id="post"></div>
  <div class="splash" id="splash">
    <div class="logo">Sinecan<small>95</small></div>
    <div class="tagsplash">Most problems are devex problems.</div>
    <div class="progress"><i></i></div>
  </div>
  <div class="skip">Click to skip</div>
</div>

<!-- ================= CONTEXT MENU ================= -->
<div id="ctx-menu">
  <div class="ci dis">Arrange Icons</div>
  <div class="ci" data-ctx="lineup">Line up Icons</div>
  <div class="csep"></div>

const FOLDER_ICON='<svg class="tic" viewBox="0 0 32 32"><path d="M3 9 H13 L16 12 H29 V26 H3 Z" fill="#ffd84d" stroke="#000"/></svg>';

  about:    {title:"Welcome",            icon:PERSON_ICON, w:380, h:430, x:null, y:null, body:`<div class="pane">${ABOUT}</div>`},

};

/* ===================== window manager ===================== */
let zTop=10;
const open = {}; // id -> {el, taskBtn, minimized}
const desktop = document.getElementById('desktop');
const taskButtons = document.getElementById('task-buttons');
const isMobile = () => window.matchMedia('(max-width:760px)').matches;

/* deep links: /#mcp-inspector, /#somatic-rag, /#projects ... open that window */
const HASH_TO_WIN = {about:'about',blog:'blog',projects:'projects',resume:'resume',
  somatic:'somatic','somatic-rag':'somatic',mcpinsp:'mcpinsp','mcp-inspector':'mcpinsp'};
function openFromHash(){
  const h=(location.hash||'').replace(/^#/,'').toLowerCase();
  if(HASH_TO_WIN[h]) openWindow(HASH_TO_WIN[h]);
}
window.addEventListener('hashchange',openFromHash);

function makeMenu(){
  return `<div class="menustrip">${['File','Edit','View','Help'].map(m=>'<span>'+m+'</span>').join('')}</div>`;
}

function openWindow(id){
  const def = WINDOWS[id];
  if(!def) return;
  if(open[id]){ if(open[id].minimized){ toggleMin(id,false);} focusWin(id); return; }

  const el=document.createElement('div');
  el.className='window bevel-out';
  el.dataset.id=id;
  const vw=window.innerWidth||1280, vh=window.innerHeight||800;
  const W=Math.max(220, Math.min(def.w, vw-20));
  const H=Math.max(140, Math.min(def.h, vh-60));
  const x = def.x!=null?def.x : Math.max(10, Math.round((vw-W)/2) + (Object.keys(open).length*22)%80 - 40);
  const y = def.y!=null?def.y : Math.max(10, Math.round((vh-60-H)/2) + (Object.keys(open).length*18)%60 - 30);
  el.style.width=W+'px';
  el.style.height=H+'px';
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.innerHTML=`
    <div class="title-bar">
      <div class="title-bar-text">${def.icon||''}<span>${def.title}</span></div>
      <div class="title-bar-controls">
        <button class="tb-btn" data-act="min" title="Minimize"><span class="tb-glyph" style="align-self:flex-end;margin-bottom:2px">▁</span></button>
        <button class="tb-btn" data-act="max" title="Maximize"><span class="tb-glyph">❐</span></button>
        <button class="tb-btn" data-act="close" title="Close"><span class="tb-glyph">✕</span></button>
      </div>
    </div>
    ${def.menu?makeMenu():''}
    <div class="window-body">${def.body}</div>`;
  desktop.appendChild(el);

  // taskbar button
  const tb=document.createElement('button');
  tb.className='task-btn';
  tb.innerHTML=`${(def.icon||'').replace('tic','ic')}<span class="lbl">${def.title}</span>`;
  tb.addEventListener('click',()=>{
    if(open[id].minimized){ toggleMin(id,false); focusWin(id); }
    else if(el.classList.contains('focused-top')) { toggleMin(id,true); }
    else focusWin(id);
  });
  taskButtons.appendChild(tb);

  open[id]={el,taskBtn:tb,minimized:false};

  // wire controls
  el.querySelectorAll('.tb-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const a=b.dataset.act;
      if(a==='close') closeWin(id);
      else if(a==='min') toggleMin(id,true);
      else if(a==='max') toggleMax(id);
    });
  });
  // drag
  dragify(el);
  // focus on any click
  el.addEventListener('mousedown',()=>focusWin(id));
  focusWin(id);
}

function focusWin(id){
  Object.values(open).forEach(o=>{ o.el.classList.add('inactive'); o.el.classList.remove('focused-top'); o.taskBtn.classList.remove('active'); });
  const o=open[id];
  if(!o) return;
  o.el.classList.remove('inactive');
  o.el.classList.add('focused-top');
  o.el.style.zIndex=++zTop;
  o.taskBtn.classList.add('active');
}
function closeWin(id){
  const o=open[id]; if(!o) return;
  const el=o.el, tb=o.taskBtn;
  delete open[id];
  tb.remove();
  el.classList.add('closing');
  setTimeout(()=>el.remove(),100);
}
function openLink(url){
  document.body.classList.add('busy');
  setTimeout(()=>{ window.open(url,'_blank'); document.body.classList.remove('busy'); },420);
}
function toggleMin(id,min){
  const o=open[id]; if(!o) return;
  o.minimized=min;
  o.el.style.display=min?'none':'flex';
  if(min){ o.taskBtn.classList.remove('active'); o.el.classList.remove('focused-top'); }
  else focusWin(id);
}
function toggleMax(id){
  const o=open[id]; if(!o) return;
  const el=o.el;
  if(el.dataset.max){
    el.style.left=el.dataset.ox; el.style.top=el.dataset.oy;
    el.style.width=el.dataset.ow; el.style.height=el.dataset.oh;
    delete el.dataset.max;
  } else {
    el.dataset.ox=el.style.left; el.dataset.oy=el.style.top;
    el.dataset.ow=el.style.width; el.dataset.oh=el.style.height;
    el.dataset.max='1';
    el.style.left='0px'; el.style.top='0px';
    el.style.width=window.innerWidth+'px';
    el.style.height=(window.innerHeight-30)+'px';
  }
  focusWin(id);
}

function dragify(el){
  const bar=el.querySelector('.title-bar');
  let sx,sy,ox,oy,drag=false;
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('.tb-btn')) return;
    if(el.dataset.max || isMobile()) return;
    drag=true; sx=e.clientX; sy=e.clientY;
    ox=parseInt(el.style.left); oy=parseInt(el.style.top);
    document.body.style.userSelect='none';
  });
  window.addEventListener('mousemove',e=>{
    if(!drag) return;
    let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
    ny=Math.max(0,Math.min(ny, window.innerHeight-60));
    nx=Math.max(-el.offsetWidth+60, Math.min(nx, window.innerWidth-60));
    el.style.left=nx+'px'; el.style.top=ny+'px';
  });
  window.addEventListener('mouseup',()=>{ drag=false; document.body.style.userSelect=''; });
}

/* ===================== content interactions (delegation) ===================== */
document.addEventListener('click',e=>{
  // in-pane buttons that open windows (e.g. About window shortcuts)
  const opener=e.target.closest('[data-open]');
  if(opener){ openWindow(opener.dataset.open); closeStart(); }
});

function openTarget(elm){
  if(elm.dataset.open) openWindow(elm.dataset.open);
  else if(elm.dataset.article) openWindow(elm.dataset.article);
  else if(elm.dataset.link) openLink(elm.dataset.link);
}

/* desktop icon + file-row: double-click on desktop, single-tap on touch */
function bindDeskInteractions(){
  document.addEventListener('dblclick',e=>{
    const t=e.target.closest('.desk-icon[data-dbl], .file-row[data-dbl]');
    if(t) openTarget(t);
  });
  document.addEventListener('click',e=>{
    const ic=e.target.closest('.desk-icon');
    const fr=e.target.closest('.file-row');
    if(isMobile()){                      // touch: one tap opens
      if(ic){ openTarget(ic); return; }
      if(fr){ openTarget(fr); return; }
    }
    document.querySelectorAll('.desk-icon.sel').forEach(d=>d.classList.remove('sel'));
    if(ic) ic.classList.add('sel');
    document.querySelectorAll('.file-row.sel').forEach(d=>d.classList.remove('sel'));
    if(fr) fr.classList.add('sel');
  });
}

/* ===================== Start menu ===================== */
const startBtn=document.getElementById('start-btn');
const startMenu=document.getElementById('start-menu');
function closeStart(){ startMenu.classList.remove('open'); startBtn.classList.remove('on'); }
startBtn.addEventListener('click',e=>{
  e.stopPropagation();
  startMenu.classList.toggle('open');
  startBtn.classList.toggle('on');
});
startMenu.addEventListener('click',e=>{
  const item=e.target.closest('.sm-item'); if(!item) return;
  if(item.dataset.open){ openWindow(item.dataset.open); }
  else if(item.dataset.link){ openLink(item.dataset.link); }
  closeStart();
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) closeStart();
});

/* ===================== clock ===================== */
function tick(){
  const d=new Date();
  let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'PM':'AM'; h=h%12; if(h===0)h=12;
  document.getElementById('clock').textContent=h+':'+String(m).padStart(2,'0')+' '+ap;
}
tick(); setInterval(tick,10000);

/* ===================== context menu ===================== */
const ctx=document.getElementById('ctx-menu');
document.getElementById('desktop').addEventListener('contextmenu',e=>{
  if(e.target.closest('.window')) return; // let windows keep native menu for text
  e.preventDefault();
  const x=Math.min(e.clientX, window.innerWidth-170);
  const y=Math.min(e.clientY, window.innerHeight-160);
  ctx.style.left=x+'px'; ctx.style.top=y+'px';
  ctx.classList.add('open');
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#ctx-menu')) ctx.classList.remove('open');
});
ctx.addEventListener('click',e=>{
  const it=e.target.closest('.ci[data-ctx]'); if(!it) return;
  const a=it.dataset.ctx;
  ctx.classList.remove('open');
  if(a==='props'){ openWindow('about'); }
  else if(a==='refresh' || a==='lineup'){
    const icons=document.getElementById('desk-icons');
    icons.style.transition='none'; icons.style.opacity='0';
    requestAnimationFrame(()=>{ icons.style.transition='opacity .18s'; icons.style.opacity='1'; });
  }
});

/* ===================== boot ===================== */
bindDeskInteractions();
(function boot(){
  const boot=document.getElementById('boot');
  const post=document.getElementById('post');
  const splash=document.getElementById('splash');

  function finish(){
    if(boot.dataset.done) return;
    boot.dataset.done='1';
    boot.classList.add('fade');
    setTimeout(()=>boot.remove(),520);
    setTimeout(()=>{ openWindow('about'); openFromHash(); },0);
  }

  // returning within the same tab session skips the show
  if(sessionStorage.getItem('booted')){
    boot.remove();
    setTimeout(()=>{ openWindow('about'); openFromHash(); },0);
    bindSkip(true);
    return;
  }
  sessionStorage.setItem('booted','1');

  const lines=[
    'Sinecan BIOS v95.06.30  (C) 1995-2026',
    '',
    'Detecting hardware ...... OK',
    'Memory Test : 640K Base, 64512K Extended ... OK',
    'Detecting MCP servers ... 9 found',
    'Mounting //esinecan.com ... OK',
    '',
    'Starting Sinecan 95 ...',
  ];
  let i=0;
  const timer=setInterval(()=>{
    if(boot.dataset.done){ clearInterval(timer); return; }
    const d=document.createElement('div');
    d.className='ln'; d.textContent=lines[i]||'';
    post.appendChild(d);
    i++;
    if(i>=lines.length){
      clearInterval(timer);
      setTimeout(()=>{ if(!boot.dataset.done){ post.style.display='none'; splash.classList.add('on'); } }, 280);
      setTimeout(finish, 1700);
    }
  }, 150);

  function bindSkip(now){
    boot.addEventListener('click',finish);
    window.addEventListener('keydown',finish,{once:true});
  }
  bindSkip();
})();
</script>
